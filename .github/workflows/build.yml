name: Build
permissions: write-all
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version'
        required: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            format: 7z
          - os: macos-latest
            arch: arm64

    name: Build ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.format && '-' || '' }}${{ matrix.format || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Determine and Update Version
        shell: bash
        run: |
          GIT_COMMIT_HASH=$(git rev-parse --short HEAD)
          VERSION=$(jq -r '.version' package.json)

          if [ "${{ github.event.inputs.version }}" == "" ]; then
            BASE_VERSION=$(echo $VERSION | awk -F. '{print $1"."$2"."$3+1}')
            VERSION_PREFIX=${VERSION_PREFIX:-beta}
            RELEASE_VERSION="${BASE_VERSION}-${VERSION_PREFIX}-${GIT_COMMIT_HASH}"
          else
            INPUT_VERSION="${{ github.event.inputs.version }}"
            CLEAN_VERSION=$(echo "$INPUT_VERSION" | sed 's/^v//')
            if [[ ! "$CLEAN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format: $INPUT_VERSION"
              exit 1
            fi
            RELEASE_VERSION="$CLEAN_VERSION"
          fi

          jq --arg version "$RELEASE_VERSION" '.version = $version' package.json > tmp.json && mv tmp.json package.json

      - name: Install Dependencies and Prepare
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            windows-latest-x64) PNPM_TARGET_FLAGS="--os=current --os=win32 --cpu=current --cpu=x64"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-win32-x64-msvc" ;;
            windows-latest-arm64) PNPM_TARGET_FLAGS="--os=current --os=win32 --cpu=current --cpu=arm64"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-win32-arm64-msvc" ;;
            ubuntu-latest-x64) PNPM_TARGET_FLAGS="--os=current --os=linux --cpu=current --cpu=x64 --libc=current --libc=glibc"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-linux-x64-gnu" ;;
            ubuntu-latest-arm64) PNPM_TARGET_FLAGS="--os=current --os=linux --cpu=current --cpu=arm64 --libc=current --libc=glibc"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-linux-arm64-gnu" ;;
            ubuntu-latest-loong64) PNPM_TARGET_FLAGS="--os=current --os=linux --cpu=current --cpu=loong64 --libc=current --libc=glibc"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-linux-loong64-gnu" ;;
            macos-latest-x64) PNPM_TARGET_FLAGS="--os=current --os=darwin --cpu=current --cpu=x64"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-darwin-x64" ;;
            macos-latest-arm64) PNPM_TARGET_FLAGS="--os=current --os=darwin --cpu=current --cpu=arm64"; RULE_CONVERTER_NATIVE_PACKAGE="@uruhalushia/rule-converter-napi-darwin-arm64" ;;
            *) echo "Unsupported rule-converter target: ${{ matrix.os }}-${{ matrix.arch }}" && exit 1 ;;
          esac
          SKIP_PREPARE=1 pnpm install $PNPM_TARGET_FLAGS
          verify_rule_converter_native() {
            node -e "require('node:module').createRequire(require.resolve('@uruhalushia/rule-converter-napi')).resolve(process.argv[1].trim() + '/package.json')" "$RULE_CONVERTER_NATIVE_PACKAGE"
          }
          if ! verify_rule_converter_native; then
            RULE_CONVERTER_VERSION=$(node -p "require('./node_modules/@uruhalushia/rule-converter-napi/package.json').version")
            SKIP_PREPARE=1 pnpm add "$RULE_CONVERTER_NATIVE_PACKAGE@$RULE_CONVERTER_VERSION" -D --ignore-scripts $PNPM_TARGET_FLAGS
          fi

          pnpm exec node -e "const fs=require('node:fs');const path=require('node:path');const target=process.argv[1].trim();const keep=target.split('/').pop();const base=path.dirname(path.dirname(require.resolve('@uruhalushia/rule-converter-napi/package.json')));for(const name of fs.readdirSync(base)){if(name.startsWith('rule-converter-napi-')&&name!==keep)fs.rmSync(path.join(base,name),{recursive:true,force:true});}const store=path.join(process.cwd(),'node_modules','.pnpm');for(const name of fs.readdirSync(store)){if(name.startsWith('@uruhalushia+rule-converter-napi-')&&!name.startsWith('@uruhalushia+'+keep+'@'))fs.rmSync(path.join(store,name),{recursive:true,force:true});}" "$RULE_CONVERTER_NATIVE_PACKAGE"
          verify_rule_converter_native \
            || (echo "Missing $RULE_CONVERTER_NATIVE_PACKAGE. pnpm must install cross-platform optional native dependencies." && exit 1)
          pnpm prepare --${{ matrix.arch }}

      - name: Build
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm build:win ${{ matrix.format }} --${{ matrix.arch }}
          else
            pnpm build:mac --${{ matrix.arch }}
          fi

      - name: Add Portable Flag
        if: matrix.os == 'windows-latest' && matrix.format == '7z'
        shell: pwsh
        run: |
          New-Item -Path "PORTABLE" -ItemType File
          Get-ChildItem dist/*portable.7z | ForEach-Object {
            7z a $_.FullName PORTABLE
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.format && '-' || '' }}${{ matrix.format || '' }}
          path: |
            dist/sparkle*
            !dist/sparkle.app.plist
            !dist/sparkle*blockmap*
